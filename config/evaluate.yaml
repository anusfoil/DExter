renderer: "diff"  # "diff", "basismixer", "scoreperformer", "virtuosonet"
gpus: [0]
epochs: 400
learning_rate: 5e-5
renderer_path: null  # external basis-mixer / virtuosonet binary; only set when --renderer=basismixer/etc.
pretrained_path: 'artifacts/checkpoint/last.ckpt'
data_root: ./data
seg_len: 200
pin_memory: True
random_seed: 13
condition_eval: False

train_target: 'gen_noise' # 'gen_noise' or 'transfer' or 'gen_noise+transfer' or 'gen_null'

test:
    sample_steps_frac: 1
    transfer: False

dataloader:
    smoothed: False
    mixup: True
    num_data: 1600   # amount of samples for evaluation
    train:
        batch_size: 16
        shuffle: True    
        pin_memory: ${pin_memory}
        prefetch_factor: 2
    val:
        batch_size: 16
        num_workers: 1
        shuffle: False
        pin_memory: ${pin_memory}
        
        
trainer:
    gpus: ${gpus}
    


defaults:
    - model: DenoiserUnet #  DenoiserUnet or ClassifierFreeDenoiser
    - task: classifierfree_diffusion


hydra:  
  output_subdir: null  
  run:  
    dir: .