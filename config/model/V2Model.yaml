model:
  name: 'V2Model'
  args:
    # ---- p/s/c codec layout (must match prepare_data + dataset)
    p_codec_rows: 5
    # 4 base columns (onset_div, duration_div, pitch, voice) + 14 xml_features
    # (articulation_id, ornament_id, slur_state_id, tie_state_id, has_fermata,
    # is_grace, in_tuplet, active_loudness_id, in_cresc, cresc_progress, in_dim,
    # dim_progress, active_tempo_kind_id, pedal_down) when include_xml_features=True.
    # Drop to 4 if running without the augmented HDF5.
    s_codec_rows: 18
    c_codec_rows: 7         # accepted-and-ignored by v2; kept for shape parity
    seg_len: ${seg_len}

    # ---- transformer hparams
    d_model: 384
    n_heads: 6
    n_layers: 12
    mlp_ratio: 4.0
    dropout: 0.0
    cond_dropout: 0.1

    # ---- hierarchical target (the multi-scale piece)
    target_transform: 'dct'         # 'identity' | 'dct' | 'wavelet'
    target_keep_low_k: 64           # K — bandwidth for the low-pass smoothness prior.
                                    # K=32 (16% of seg_len=200) was over-smoothing
                                    # in the May 1 run; K=64 (32%) leaves more
                                    # room for note-level expressive variation.
    transform_score_codec: True     # also DCT s_codec channel-wise to match coef length

    # ---- legacy hparams (accepted-and-ignored by TransformerDenoiser; kept
    #      for compatibility with the existing classifierfree_diffusion task config)
    residual_channels: 384
    unconditional: False
    condition: 'fixed'
    residual_layers: 12
    kernel_size: 3
    dilation_base: 2
    dilation_bound: 4
    norm_args:
      - 0
      - 1
      - 'rowwise'
