model:
  name: 'V2Model'
  args:
    p_codec_rows: 5
    # 24 base/xml + 6 prior-context (F_p + 1 mask) = 30 conditioning columns.
    # The HierarchicalCodecDiffusion subclass concatenates the prior block onto
    # s_codec_coef before passing to the model, so the input projection layer
    # needs to be sized for 30. Drop to 24 to disable AR context entirely.
    s_codec_rows: 30
    c_codec_rows: 7
    seg_len: ${seg_len}

    # Transformer hparams — same as the production V2Model.
    d_model: 384
    n_heads: 6
    n_layers: 12
    mlp_ratio: 4.0
    dropout: 0.0
    cond_dropout: 0.1

    # Hierarchical target — DCT bandwidth scales with seg_len. K/N=16% across
    # configurations so smoothness prior strength stays comparable.
    target_transform: 'dct'
    target_keep_low_k: 320          # for seg_len=2000; use 32 for seg_len=200
    transform_score_codec: True

    # Legacy hparams — accepted-and-ignored by TransformerDenoiser, kept for
    # CodecDiffusion shape parity.
    residual_channels: 384
    unconditional: False
    condition: 'fixed'
    residual_layers: 12
    kernel_size: 3
    dilation_base: 2
    dilation_bound: 4
    norm_args: [0, 1, 'rowwise']
